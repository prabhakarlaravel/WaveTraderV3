server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # --- General ---
    client_max_body_size 20M;

    # --- Laravel API ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 90s;
    }

    # --- UDF SSE streaming endpoint ---
    # Server-Sent Events need proxy_buffering off to deliver events immediately.
    # Redis Pub/Sub feeds this — never polls the DB.
    location /api/udf/streaming {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;

        # Critical for SSE: disable all buffering
        proxy_buffering off;
        fastcgi_buffering off;
        proxy_cache off;

        # Long timeout for persistent SSE connections
        fastcgi_read_timeout 3600s;
        proxy_read_timeout 3600s;

        # Prevent Nginx from closing idle connections
        keepalive_timeout 3600s;

        # SSE headers
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Accel-Buffering "no";
    }

    # --- WebSocket upgrade for Laravel Reverb ---
    location /app {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — keep connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Static assets ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Deny hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
