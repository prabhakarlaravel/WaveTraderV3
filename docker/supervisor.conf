[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

; ─── PHP-FPM (Laravel API) ───────────────────────────────────────────────────
[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─── Laravel Reverb (WebSocket Server) ───────────────────────────────────────
; Handles all real-time broadcasting: CandleUpdated, OverlaysUpdated, SignalGenerated
[program:reverb]
command=php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/reverb.log
stderr_logfile=/var/log/supervisor/reverb-error.log

; ─── Laravel Horizon (Queue Manager) ─────────────────────────────────────────
; Manages two supervisors:
;   supervisor-default: handles default queue (gap fills, misc)
;   supervisor-engines: handles 'engines' queue (RunEnginesJob — CPU-heavy, needs more workers)
[program:horizon]
command=php /var/www/html/artisan horizon
autostart=true
autorestart=true
priority=15
stdout_logfile=/var/log/supervisor/horizon.log
stderr_logfile=/var/log/supervisor/horizon-error.log

; ─── Laravel Scheduler ───────────────────────────────────────────────────────
; Runs every second, checks cron schedule:
;   - candles:fetch --all: every 30s (market-hours aware, skips closed markets)
;   - zerodha:renew-token: daily at 03:15 UTC (8:45 AM IST) on weekdays
[program:scheduler]
command=php /var/www/html/artisan schedule:work
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/scheduler.log
stderr_logfile=/var/log/supervisor/scheduler-error.log
