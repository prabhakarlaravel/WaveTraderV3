services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: wavetrader_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wavetrader
      POSTGRES_USER: wavetrader
      POSTGRES_PASSWORD: wavetrader
    volumes:
      - wavetrader_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  wavetrader_pgdata:
